name: Build EdgeTX TX12MK2

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt update
      sudo apt install -y \
        git cmake build-essential \
        gcc-arm-none-eabi binutils-arm-none-eabi \
        libnewlib-arm-none-eabi \
        python3 python3-pip
      python3 -m pip install lz4

  - name: Clone EdgeTX (exact version)
    run: |
      git clone https://github.com/EdgeTX/edgetx.git
      cd edgetx
      git checkout d982f5fc

  - name: Verify target exists
    run: |
      cd edgetx/radio/src/targets
      ls

  - name: Build firmware
    run: |
      cd edgetx
      mkdir build
      cd build
      cmake .. -DPCB=tx12mk2 -DLUA=YES -DCMAKE_BUILD_TYPE=Release
      make firmware -j$(nproc)

  - name: Find firmware
    run: |
      cd edgetx/build
      echo "Searching firmware..."
      find . -name "*.bin" -size +500k

  - name: Upload firmware
    uses: actions/upload-artifact@v4
    with:
      name: firmware_tx12mk2
      path: edgetx/build/**/*.bin

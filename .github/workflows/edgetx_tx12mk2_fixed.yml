name: EdgeTX TX12 MKII Lua Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # CLEAN
      # -------------------------
      - name: Clean workspace
        run: |
          rm -rf build
          mkdir build

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive
          fetch-depth: 1

      # -------------------------
      # TOOLCHAIN
      # -------------------------
      - name: Install ARM Toolchain 14.2
        run: |
          set -e

          sudo apt update
          sudo apt install -y wget xz-utils python3 python3-pip

          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          export PATH="$PWD/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi/bin:$PATH"

          echo "$PWD/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

          arm-none-eabi-gcc --version

      # -------------------------
      # PYTHON DEPENDENCIES (FIXED)
      # -------------------------
      - name: Install Python deps
        run: |
          pip3 install --no-cache-dir lz4 pillow numpy

      # -------------------------
      # CONFIGURE
      # -------------------------
      - name: Configure
        run: |
          cmake -S . -B build \
            -DRADIO=tx12 \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DWIDGETS=OFF \
            -DTELEMETRY_LOG=OFF \
            -DDEBUG=OFF \
            -DVOICE=ON \
            -DSOUND=ON \
            -DCMAKE_BUILD_TYPE=Release

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build
        run: |
          cmake --build build --target firmware

      # -------------------------
      # FIND BIN
      # -------------------------
      - name: Find firmware
        run: |
          find build -name "*.bin"

      # -------------------------
      # UPLOAD
      # -------------------------
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12-lua
          path: build/**/*.bin

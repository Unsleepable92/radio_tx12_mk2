name: EdgeTX TX12 MKII Stable Lua Build (v2.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
      BUILD_DIR: ${{ github.workspace }}/build

    steps:

      # =========================
      # CLEAN WORKSPACE (ANTI FUTURE FAIL)
      # =========================
      - name: Clean workspace
        run: |
          rm -rf $BUILD_DIR
          rm -rf $TOOLCHAIN_DIR
          mkdir -p $BUILD_DIR
          mkdir -p $TOOLCHAIN_DIR

      # =========================
      # CHECKOUT (LOCKED VERSION)
      # =========================
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive
          fetch-depth: 1

      # =========================
      # TOOLCHAIN (PINNED + STABLE PATH)
      # =========================
      - name: Install ARM GCC 14.2.rel1
        run: |
          sudo apt update
          sudo apt install -y wget xz-utils ca-certificates

          cd $TOOLCHAIN_DIR

          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          echo "$TOOLCHAIN_DIR/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

          export PATH="$TOOLCHAIN_DIR/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi/bin:$PATH"

          arm-none-eabi-gcc --version

      # =========================
      # PYTHON (LOCKED DEPENDENCIES)
      # =========================
      - name: Install Python deps
        run: |
          sudo apt install -y python3 python3-pip
          pip3 install --no-cache-dir lz4

      # =========================
      # VERIFY TARGET EXISTS (FAIL FAST)
      # =========================
      - name: Validate TX12 MKII target
        run: |
          if [ ! -d "radio/src/targets/tx12_mk2" ]; then
            echo "ERROR: tx12_mk2 target not found"
            echo "Available targets:"
            ls radio/src/targets || true
            exit 1
          fi

      # =========================
      # CONFIGURE (CLEAN + NO CACHE LEAKS)
      # =========================
      - name: Configure build
        run: |
          cd $BUILD_DIR

          cmake .. \
            -DRADIO=tx12_mk2 \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DWIDGETS=OFF \
            -DTELEMETRY_LOG=OFF \
            -DDEBUG=OFF \
            -DVOICE=ON \
            -DSOUND=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=OFF

      # =========================
      # BUILD (NO PARALLEL RACE ISSUES)
      # =========================
      - name: Build firmware
        run: |
          cd $BUILD_DIR
          make firmware

      # =========================
      # HARD OUTPUT CHECK
      # =========================
      - name: Find firmware output
        run: |
          echo "Searching firmware binaries..."

          FILES=$(find $BUILD_DIR -type f -name "*.bin")

          if [ -z "$FILES" ]; then
            echo "ERROR: No firmware .bin found"
            exit 1
          fi

          echo "$FILES"

      # =========================
      # ARTIFACT UPLOAD (SAFE PATH)
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-v2.12-lua-stable
          path: |
            build/**/*.bin

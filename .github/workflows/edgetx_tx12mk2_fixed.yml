name: EdgeTX TX12 MKII ELRS v2.12 (FINAL FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # CLEAN
      # -------------------------
      - name: Clean workspace
        run: |
          rm -rf build
          mkdir build

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive
          fetch-depth: 1

      # -------------------------
      # SYSTEM DEPS
      # -------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3 \
            python3-pip \
            cmake \
            build-essential \
            clang \
            libclang-dev

      # -------------------------
      # PYTHON DEPS
      # -------------------------
      - name: Python deps
        run: |
          pip3 install --no-cache-dir \
            pillow \
            numpy \
            lz4 \
            clang

      # -------------------------
      # ARM TOOLCHAIN CHECK (важно 14.2)
      # -------------------------
      - name: Verify toolchain
        run: |
          arm-none-eabi-gcc --version

      # -------------------------
      # CONFIGURE (КЛЮЧЕВОЙ ФИКС)
      # -------------------------
      - name: Configure
        run: |
          cmake -S . -B build \
            -DPCB=TX12 \
            -DPCBREV=MK2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DWIDGETS=NO \
            -DTELEMETRY_LOG=NO \
            -DVOICE=YES \
            -DSOUND=YES \
            -DCMAKE_BUILD_TYPE=Release

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build firmware
        run: |
          cmake --build build --target firmware

      # -------------------------
      # OUTPUT CHECK
      # -------------------------
      - name: Find firmware
        run: |
          find build -name "*.bin"

      # -------------------------
      # UPLOAD
      # -------------------------
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: tx12mk2-v2.12-fixed
          path: build/**/*.bin

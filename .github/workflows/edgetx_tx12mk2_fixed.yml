name: EdgeTX TX12 MKII ELRS (Safe Lua Build)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3 \
            python3-pip \
            cmake \
            ninja-build \
            build-essential

      - name: Python deps
        run: |
          pip3 install pillow numpy lz4

      # 👉 КЛЮЧ: используем официальный preset через toolchain file
      - name: Configure (official style)
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DDEFAULT_TARGET=tx12 \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DWIDGETS=OFF \
            -DVOICE=ON \
            -DSOUND=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --target firmware

      - name: Output
        run: |
          find build -name "*.bin"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-safe
          path: build/**/*.bin

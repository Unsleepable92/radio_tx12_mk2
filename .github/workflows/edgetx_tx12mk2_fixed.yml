name: EdgeTX TX12 MKII ELRS SAFE BUILD (v2.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # CLEAN
      # -------------------------
      - name: Clean
        run: |
          rm -rf build
          mkdir build

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive

      # -------------------------
      # INSTALL TOOLCHAIN
      # -------------------------
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3 \
            python3-pip \
            cmake \
            build-essential

      # -------------------------
      # PYTHON
      # -------------------------
      - name: Python deps
        run: |
          pip3 install --no-cache-dir pillow numpy lz4

      # -------------------------
      # CONFIGURE
      # -------------------------
      - name: Configure
        run: |
          cmake -S . -B build \
            -DPCB=X10 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DWIDGETS=NO \
            -DTELEMETRY_LOG=NO \
            -DVOICE=YES \
            -DSOUND=YES \
            -DCMAKE_BUILD_TYPE=Release

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build
        run: |
          cmake --build build --target firmware

      # -------------------------
      # OUTPUT
      # -------------------------
      - name: Output
        run: |
          find build -name "*.bin"

      # -------------------------
      # UPLOAD
      # -------------------------
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-elrs
          path: build/**/*.bin

name: Build EdgeTX TX12 MK2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EdgeTX
        run: |
          git clone https://github.com/EdgeTX/edgetx.git
          cd edgetx
          git checkout v2.12.0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            build-essential \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3 \
            python3-pip

          pip3 install lz4

      - name: Configure
        run: |
          cd edgetx
          mkdir build
          cd build

          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DPCB=tx12mk2 \
            -DLUA=YES

      - name: Build firmware ONLY
        run: |
          cd edgetx/build
          make firmware -j$(nproc)

      - name: Find real firmware
        run: |
          cd edgetx/build
          echo "Searching firmware..."
          find . -name "*.bin" -size +500k

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: edgetx/build/**/*.bin

name: EdgeTX TX12 MKII Lua Stable Build (v2.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      WORKSPACE: ${{ github.workspace }}
      BUILD_DIR: ${{ github.workspace }}/build
      TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
      TOOLCHAIN_VER: arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi

    steps:

      # =========================
      # CLEAN ENVIRONMENT (ANTI STATE BUGS)
      # =========================
      - name: Clean workspace
        run: |
          rm -rf $BUILD_DIR
          rm -rf $TOOLCHAIN_DIR
          mkdir -p $BUILD_DIR
          mkdir -p $TOOLCHAIN_DIR

      # =========================
      # CHECKOUT (SHALLOW + SAFE)
      # =========================
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive
          fetch-depth: 1

      # =========================
      # TOOLCHAIN (FIXED + NO CD DEPENDENCY)
      # =========================
      - name: Install ARM GCC 14.2.rel1
        run: |
          sudo apt update
          sudo apt install -y wget xz-utils ca-certificates

          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/${TOOLCHAIN_VER}.tar.xz -O toolchain.tar.xz

          tar -xf toolchain.tar.xz -C $TOOLCHAIN_DIR

          TOOLCHAIN_PATH=$TOOLCHAIN_DIR/$TOOLCHAIN_VER/bin

          echo $TOOLCHAIN_PATH >> $GITHUB_PATH

          export PATH=$TOOLCHAIN_PATH:$PATH

          arm-none-eabi-gcc --version

      # =========================
      # PYTHON DEPENDENCIES
      # =========================
      - name: Install Python deps
        run: |
          sudo apt install -y python3 python3-pip
          pip3 install --no-cache-dir lz4

      # =========================
      # VALIDATE TARGET (FAIL FAST SAFETY)
      # =========================
      - name: Validate TX12 MKII target
        run: |
          if [ ! -d "radio/src/targets" ]; then
            echo "ERROR: radio/src/targets missing"
            exit 1
          fi

          if [ ! -d "radio/src/targets/tx12_mk2" ]; then
            echo "ERROR: tx12_mk2 target not found"
            echo "Available targets:"
            ls radio/src/targets
            exit 1
          fi

      # =========================
      # CONFIGURE (CLEAN BUILD, NO CACHE LEAKS)
      # =========================
      - name: Configure build
        run: |
          cmake -S . -B $BUILD_DIR \
            -DRADIO=tx12_mk2 \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DWIDGETS=OFF \
            -DTELEMETRY_LOG=OFF \
            -DDEBUG=OFF \
            -DVOICE=ON \
            -DSOUND=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=OFF

      # =========================
      # BUILD (NO PARALLEL RISK REDUCTION)
      # =========================
      - name: Build firmware
        run: |
          cmake --build $BUILD_DIR --target firmware

      # =========================
      # VERIFY OUTPUT (STRICT CHECK)
      # =========================
      - name: Verify firmware output
        run: |
          FILES=$(find $BUILD_DIR -type f -name "*.bin")

          if [ -z "$FILES" ]; then
            echo "ERROR: firmware .bin not generated"
            exit 1
          fi

          echo "Firmware generated:"
          echo "$FILES"

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-v2.12-lua-stable
          path: |
            build/**/*.bin

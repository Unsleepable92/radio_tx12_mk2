name: EdgeTX TX12 MKII Lua Build (v2.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive

      # =========================
      # ARM TOOLCHAIN FIX (CRITICAL)
      # =========================
      - name: Install ARM GNU Toolchain 14.2.rel1
        run: |
          sudo apt update
          sudo apt install -y wget xz-utils

          wget https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          echo "$PWD/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

          arm-none-eabi-gcc --version

      # =========================
      # BUILD DEPENDENCIES
      # =========================
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            git \
            python3 \
            python3-pip

          pip3 install lz4

      # =========================
      # CONFIGURE BUILD
      # =========================
      - name: Configure EdgeTX
        run: |
          mkdir build
          cd build

          cmake .. \
            -DRADIO=tx12_mk2 \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DWIDGETS=OFF \
            -DTELEMETRY_LOG=OFF \
            -DDEBUG=OFF \
            -DVOICE=ON \
            -DSOUND=ON \
            -DCMAKE_BUILD_TYPE=Release

      # =========================
      # BUILD FIRMWARE
      # =========================
      - name: Build firmware
        run: |
          cd build
          make -j$(nproc) firmware

      # =========================
      # FIND OUTPUT
      # =========================
      - name: Locate firmware
        run: |
          echo "=== BUILT FILES ==="
          find build -name "*.bin" -type f -size +200k

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-lua-v2.12
          path: build/**/*.bin

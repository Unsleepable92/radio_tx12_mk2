name: EdgeTX TX12 MKII ELRS FINAL BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # CLEAN
      # -------------------------
      - name: Clean
        run: |
          rm -rf build toolchain
          mkdir build

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive

      # -------------------------
      # INSTALL BASE DEPS
      # -------------------------
      - name: Install base deps
        run: |
          sudo apt update
          sudo apt install -y \
            wget \
            xz-utils \
            python3 \
            python3-pip \
            cmake \
            build-essential

      # -------------------------
      # INSTALL TOOLCHAIN 14.2 (КРИТИЧНО)
      # -------------------------
      - name: Install ARM GCC 14.2.rel1
        run: |
          set -e

          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          TOOLCHAIN="$PWD/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi/bin"

          echo "$TOOLCHAIN" >> $GITHUB_PATH

          export PATH="$TOOLCHAIN:$PATH"

          arm-none-eabi-gcc --version

      # -------------------------
      # PYTHON DEPS
      # -------------------------
      - name: Python deps
        run: |
          pip3 install --no-cache-dir pillow numpy lz4

      # -------------------------
      # CONFIGURE
      # -------------------------
      - name: Configure
        run: |
          cmake -S . -B build \
            -DPCB=X10 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DWIDGETS=NO \
            -DTELEMETRY_LOG=NO \
            -DVOICE=YES \
            -DSOUND=YES \
            -DCMAKE_BUILD_TYPE=Release

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build
        run: |
          cmake --build build --target firmware

      # -------------------------
      # OUTPUT
      # -------------------------
      - name: Output
        run: |
          find build -name "*.bin"

      # -------------------------
      # UPLOAD
      # -------------------------
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-elrs-final
          path: build/**/*.bin

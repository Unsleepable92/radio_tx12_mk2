name: EdgeTX TX12 MKII ELRS Stable Build (v2.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # CLEAN WORKSPACE
      # =========================
      - name: Clean workspace
        run: |
          rm -rf build toolchain
          mkdir build

      # =========================
      # CHECKOUT EDGE TX
      # =========================
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive
          fetch-depth: 1

      # =========================
      # TOOLCHAIN (FIXED ARM GCC 14.2)
      # =========================
      - name: Install ARM GCC 14.2.rel1
        run: |
          set -e

          sudo apt update
          sudo apt install -y wget xz-utils python3 python3-pip

          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz

          TOOLCHAIN_PATH="$PWD/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi/bin"

          echo "$TOOLCHAIN_PATH" >> $GITHUB_PATH

          export PATH="$TOOLCHAIN_PATH:$PATH"

          arm-none-eabi-gcc --version

      # =========================
      # PYTHON DEPENDENCIES
      # =========================
      - name: Install Python deps
        run: |
          pip3 install --no-cache-dir lz4 pillow numpy

      # =========================
      # CONFIGURE (CORRECT TARGET FOR TX12 MKII)
      # =========================
      - name: Configure build
        run: |
          cmake -S . -B build \
            -DRADIO=tx12 \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DWIDGETS=OFF \
            -DTELEMETRY_LOG=OFF \
            -DDEBUG=OFF \
            -DVOICE=ON \
            -DSOUND=ON \
            -DCMAKE_BUILD_TYPE=Release

      # =========================
      # BUILD FIRMWARE
      # =========================
      - name: Build firmware
        run: |
          cmake --build build --target firmware

      # =========================
      # FIND OUTPUT
      # =========================
      - name: Locate firmware
        run: |
          find build -name "*.bin"

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-lua-stable
          path: build/**/*.bin

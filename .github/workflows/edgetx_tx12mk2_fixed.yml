name: Build EdgeTX TX12 MKII Lua Telemetry

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            cmake \
            git \
            python3 \
            python3-pip

          pip3 install lz4

      - name: Configure build
        run: |
          mkdir build
          cd build
          cmake .. \
            -DRADIO=tx12_mk2 \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DWIDGETS=OFF \
            -DTELEMETRY_LOG=OFF \
            -DDEBUG=OFF \
            -DVOICE=ON \
            -DSOUND=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build firmware
        run: |
          cd build
          make -j$(nproc) firmware

      - name: Locate firmware
        run: |
          echo "Firmware files:"
          find build -name "*.bin" -type f -size +300k

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-lua
          path: build/**/*.bin

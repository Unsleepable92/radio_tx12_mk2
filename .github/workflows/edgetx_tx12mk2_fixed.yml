name: EdgeTX TX12 MKII ELRS SAFE BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive
          fetch-depth: 1

      # -------------------------
      # SYSTEM DEPS
      # -------------------------
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            cmake \
            ninja-build \
            build-essential \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi

      # -------------------------
      # PYTHON DEPS
      # -------------------------
      - name: Install Python deps
        run: |
          pip3 install --no-cache-dir pillow numpy lz4

      # -------------------------
      # BUILD (OFFICIAL WAY)
      # -------------------------
      - name: Build firmware (official script)
        run: |
          python3 tools/build.py \
            --radio tx12-mk2 \
            --lua \
            --model-scripts \
            --no-widgets

      # -------------------------
      # FIND BIN
      # -------------------------
      - name: Find firmware
        run: |
          find . -name "*.bin"

      # -------------------------
      # UPLOAD
      # -------------------------
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-elrs-safe
          path: "**/*.bin"

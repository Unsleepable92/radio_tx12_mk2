name: TX12 MK2 Lua Build FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build clang python3 git

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DDEFAULT_TARGET=tx12mk2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES

      - name: Build firmware
        run: |
          cmake --build build --target firmware -j$(nproc)

      - name: Show outputs
        run: |
          find build -name "*.bin"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: tx12mk2-lua
          path: build/**/*.bin

name: EdgeTX TX12 MK2 Build (correct firmware extraction)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip

      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Configure
        run: |
          cmake -S edgetx -B build -G Ninja \
            -DPCB=TX12 \
            -DPCB_TYPE=TX12MK2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Debug firmware files
        run: |
          echo "=== ALL BIN FILES ==="
          find build -type f -name "*.bin" -exec ls -lh {} \;

      - name: Extract correct firmware
        run: |
          mkdir -p out

          FW=$(find build -type f -iname "*tx12*.bin" | head -n 1)

          if [ -z "$FW" ]; then
            echo "Trying fallback search..."
            FW=$(find build -type f -iname "*.bin" | grep -v "bootloader" | head -n 1)
          fi

          echo "Selected firmware: $FW"
          ls -lh "$FW"

          cp "$FW" out/firmware_TX12MK2.bin

      - name: Show final size
        run: |
          ls -lh out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

name: EdgeTX TX12 MK2 Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DPCB=TX12 \
            -DPCB_TYPE=TX12MK2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Find firmware
        run: |
          find build -name "*.bin" -o -name "*.fw" -o -name "*firmware*"

      - name: Rename firmware
        run: |
          mkdir -p out
          cp $(find build -name "*.bin" | head -n 1) out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

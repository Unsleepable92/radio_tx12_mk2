name: EdgeTX Dev Pipeline (TX12 MK2)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            clang \
            make

      - name: Clone EdgeTX (official)
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      - name: Verify toolchain
        run: |
          arm-none-eabi-gcc --version

      # =========================
      # CONFIGURE (DEV STYLE)
      # =========================
      - name: Configure superbuild (EdgeTX dev style)
        run: |
          cd edgetx

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain/arm-none-eabi.cmake \
            -DEDGETX_SUPERBUILD=ON \
            -DPCB=TX12 \
            -DPCB_TYPE=TX12MK2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES \
            -Wno-dev

      # =========================
      # BUILD
      # =========================
      - name: Build (superbuild)
        run: |
          cd edgetx
          cmake --build build --parallel $(nproc)

      # =========================
      # FIND REAL FIRMWARE (STRICT)
      # =========================
      - name: Locate firmware (strict filter)
        run: |
          cd edgetx

          echo "All build outputs (top 50 largest):"
          find build -type f -name "*.bin" -exec ls -lh {} \; | sort -k5 -h | tail -n 50

          echo "Searching TX12 firmware..."

          FW=$(find build -type f \
            \( -iname "*tx12*.bin" -o -iname "*firmware*.bin" \) \
            ! -iname "*bootloader*" \
            | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ TX12 firmware NOT FOUND"
            echo "Dumping full build tree..."
            find build -type f | head -n 200
            exit 1
          fi

          echo "✅ Found firmware: $FW"
          ls -lh "$FW"

          mkdir -p ../out
          cp "$FW" ../out/firmware_TX12MK2.bin

      # =========================
      # VERIFY RESULT
      # =========================
      - name: Verify firmware
        run: |
          ls -lh out/firmware_TX12MK2.bin
          file out/firmware_TX12MK2.bin

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

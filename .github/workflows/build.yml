name: Build EdgeTX TX12 MK2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git cmake build-essential \
          gcc-arm-none-eabi g++-arm-none-eabi \
          libnewlib-arm-none-eabi \
          python3 python3-pip \
          ninja-build
        pip3 install lz4

    - name: Clone EdgeTX
      run: |
        git clone --depth 1 https://github.com/EdgeTX/edgetx.git
        cd edgetx
        git submodule update --init --recursive

    - name: Configure
      run: |
        cd edgetx
        mkdir build
        cd build
        cmake .. \
          -DPCB=TX12MK2 \
          -DLUA=YES \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build firmware
      run: |
        cd edgetx/build
        cmake --build . --target firmware -j$(nproc)

    - name: Find firmware
      run: |
        cd edgetx
        echo "Searching firmware..."
        find build -type f -name "*.bin" -size +1000k

    - name: Copy firmware
      run: |
        cd edgetx
        mkdir output
        FILE=$(find build -type f -name "*.bin" -size +1000k | head -n 1)
        echo "Found: $FILE"
        cp "$FILE" output/firmware_tx12mk2.bin

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: EdgeTX_TX12MK2_Firmware
        path: edgetx/output/firmware_tx12mk2.bin

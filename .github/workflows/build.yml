name: EdgeTX TX12 MK2 Build (auto-detect)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip

      - name: Find EdgeTX source
        id: findsrc
        run: |
          echo "Searching for CMakeLists.txt..."
          SRC_PATH=$(find . -name CMakeLists.txt -path "*/radio*/*" -o -path "*/edgetx/*" | head -n 1 | xargs dirname)

          if [ -z "$SRC_PATH" ]; then
            echo "ERROR: EdgeTX source not found"
            find . -maxdepth 4 -type f
            exit 1
          fi

          echo "SOURCE=$SRC_PATH" >> $GITHUB_ENV
          echo "Found source at: $SRC_PATH"

      - name: Configure
        run: |
          cmake -S $SOURCE -B build -G Ninja \
            -DPCB=TX12 \
            -DPCB_TYPE=TX12MK2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Collect firmware
        run: |
          mkdir -p out
          FW=$(find build -type f \( -name "*.bin" -o -name "*.fw" \) | head -n 1)

          if [ -z "$FW" ]; then
            echo "Firmware not found"
            find build
            exit 1
          fi

          cp "$FW" out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

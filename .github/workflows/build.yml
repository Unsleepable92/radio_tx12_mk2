name: EdgeTX Dev CI (REAL Superbuild Style)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            wget \
            unzip \
            rsync

      # =========================
      # CLONE EDGE TX
      # =========================
      - name: Clone EdgeTX (full)
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      # =========================
      # VERIFY TOOLCHAIN
      # =========================
      - name: Check ARM toolchain
        run: |
          arm-none-eabi-gcc --version

      # =========================
      # REAL EDGE TX SUPERBUILD ENTRY
      # =========================
      - name: Configure (EdgeTX superbuild correct mode)
        run: |
          cd edgetx

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DEDGETX_SUPERBUILD=ON \
            -DHELI=OFF \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DLUA_TELEMETRY_SCRIPTS=ON

      # =========================
      # BUILD FULL GRAPH
      # =========================
      - name: Build full EdgeTX graph
        run: |
          cd edgetx
          cmake --build build --parallel $(nproc)

      # =========================
      # IMPORTANT: CHECK GENERATED BOARDS
      # =========================
      - name: Inspect generated firmware targets
        run: |
          cd edgetx

          echo "=== Searching firmware outputs ==="
          find build -type f -name "*.bin" -exec ls -lh {} \;

          echo "=== Looking for TX12 related outputs ==="
          find build -type f | grep -i tx12 || true

      # =========================
      # EXTRACT LARGEST VALID FIRMWARE
      # =========================
      - name: Extract firmware safely
        run: |
          cd edgetx
          mkdir -p ../out

          FW=$(find build -type f -name "*.bin" -exec ls -lh {} \; \
            | awk '$5 ~ /K|M/ {print $9}' \
            | tail -n 1)

          if [ -z "$FW" ]; then
            echo "❌ No firmware generated at all"
            exit 1
          fi

          echo "Selected firmware: $FW"
          ls -lh "$FW"

          cp "$FW" ../out/firmware.bin

      # =========================
      # VERIFY RESULT
      # =========================
      - name: Verify firmware
        run: |
          ls -lh out/firmware.bin
          file out/firmware.bin

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-firmware
          path: out/firmware.bin

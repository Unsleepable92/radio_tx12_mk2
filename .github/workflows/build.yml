name: EdgeTX TX12 MK2 (correct radio target build)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
name: EdgeTX TX12 MK2 (DEBUG REAL TARGETS)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi

      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      - name: Configure firmware preset
        run: |
          cd edgetx
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain/arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -S . \
            -B build

      - name: Show available build targets (IMPORTANT)
        run: |
          cd edgetx
          cmake --build build --target help || true

      - name: Build ALL possible firmware targets (debug)
        run: |
          cd edgetx
          cmake --build build -j$(nproc) || true

      - name: Search all binaries
        run: |
          cd edgetx
          echo "=== ALL BIN FILES ==="
          find . -type f -name "*.bin" -exec ls -lh {} \;

      - name: Extract largest firmware candidate
        run: |
          cd edgetx
          mkdir -p ../out

          FW=$(find . -type f -name "*.bin" -exec ls -lh {} \; \
            | sort -k5 -h | tail -n 1 | awk '{print $9}')

          echo "Selected candidate: $FW"
          ls -lh "$FW"

          cp "$FW" ../out/firmware_TX12MK2.bin

      - name: Verify
        run: |
          ls -lh out/firmware_TX12MK2.bin
          file out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2-debug
          path: out/firmware_TX12MK2.binin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

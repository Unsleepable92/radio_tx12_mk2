name: EdgeTX TX12 MK2 (OFFICIAL BUILD SYSTEM)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            cmake \
            ninja-build \
            wget \
            unzip

      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      - name: Install python build tools
        run: |
          pip3 install -U pip
          pip3 install setuptools wheel

      # =========================
      # OFFICIAL BUILD ENTRYPOINT
      # =========================
      - name: Run EdgeTX build system
        run: |
          cd edgetx

          python3 build.py \
            -b tx12 \
            -t release

      # =========================
      # FIND OUTPUT (NO GUESSING)
      # =========================
      - name: Locate firmware
        run: |
          cd edgetx

          echo "Searching final firmware..."

          find . -type f -name "*.bin" -exec ls -lh {} \;

          FW=$(find . -type f -name "*.bin" | grep -i tx12 | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ Firmware NOT produced by build.py"
            exit 1
          fi

          echo "✅ Firmware: $FW"

          mkdir -p ../out
          cp "$FW" ../out/firmware_TX12MK2.bin

      - name: Verify
        run: |
          ls -lh out/firmware_TX12MK2.bin
          file out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

name: EdgeTX TX12 MK2 BUILD FIXED

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            make \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            python3 \
            python3-pip \
            wget \
            unzip \
            python3-pil \
            python3-lz4

      # =========================
      # CLONE EDGE TX
      # =========================
      - name: Clone EdgeTX
        run: |
          git clone --recursive --branch v2.9.0 https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      # =========================
      # CONFIGURE + BUILD
      # =========================
      - name: Configure & build TX12 MK2
        run: |
          cd edgetx
          mkdir -p build
          cd build

          cmake .. \
            -G "Unix Makefiles" \
            -DPCB=TX12MK2 \
            -DLUA=YES \
            -DCMAKE_BUILD_TYPE=Release

          make -j$(nproc)

      # =========================
      # FIND REAL FIRMWARE (IMPORTANT FIX)
      # =========================
      - name: Find firmware (REAL ONLY)
        run: |
          cd edgetx

          echo "Searching real EdgeTX firmware (>1MB)..."

          # показываем всё для отладки
          find build -type f -name "*.bin" -exec ls -lh {} \;

          echo "Filtering valid firmware..."

          FW=$(find build -type f -name "*.bin" -size +1000k | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ REAL firmware not found"

            echo "All build artifacts:"
            find build -type f -exec ls -lh {} \; | head -n 200

            exit 1
          fi

          echo "✅ Firmware selected: $FW"

          mkdir -p ../out
          cp "$FW" ../out/firmware_tx12mk2.bin

      # =========================
      # VERIFY OUTPUT
      # =========================
      - name: Verify firmware
        run: |
          ls -lh out/
          file out/firmware_tx12mk2.bin

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_tx12mk2.bin

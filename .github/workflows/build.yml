name: EdgeTX TX12 MK2 (FULL FIX TOOLCHAIN)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies (INCLUDING ARM TOOLCHAIN)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi

      - name: Verify toolchain
        run: |
          arm-none-eabi-gcc --version
          arm-none-eabi-g++ --version

      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      - name: Configure firmware
        run: |
          cd edgetx
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain/arm-none-eabi.cmake \
            -DPCB=TX12 \
            -DPCB_TYPE=TX12MK2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd edgetx
          cmake --build build -j$(nproc)

      - name: Find firmware
        run: |
          cd edgetx
          mkdir -p ../out

          FW=$(find build -type f -iname "*tx12*" -o -iname "*.bin" | head -n 1)

          echo "Firmware: $FW"
          ls -lh "$FW"

          cp "$FW" ../out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

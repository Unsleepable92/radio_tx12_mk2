name: EdgeTX Official CI-style Build (TX12 MK2)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        board:
          - tx12

    steps:
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            git \
            wget \
            unzip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            doxygen

      - name: Verify toolchain
        run: |
          arm-none-eabi-gcc --version

      # =========================
      # SUPERBUILD (OFFICIAL STYLE)
      # =========================
      - name: Configure superbuild
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DEDGETX_SUPERBUILD=ON \
            -DPCB=${{ matrix.board }} \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DLUA_TELEMETRY_SCRIPTS=ON

      - name: Build firmware
        run: |
          cmake --build build -j$(nproc)

      # =========================
      # FIND OUTPUT (SAFE METHOD)
      # =========================
      - name: Collect artifacts
        run: |
          mkdir -p out

          echo "=== Build tree summary ==="
          find build -type f -name "*.bin" -exec ls -lh {} \;

          FW=$(find build -type f -iname "*tx12*" -o -iname "*firmware*" | grep -v bootloader | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ No firmware produced"
            echo "Dumping build structure:"
            find build -type f | head -n 200
            exit 1
          fi

          echo "✅ Firmware found: $FW"
          ls -lh "$FW"

          cp "$FW" out/firmware_${{ matrix.board }}.bin

      - name: Verify firmware
        run: |
          ls -lh out/
          file out/firmware_${{ matrix.board }}.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-${{ matrix.board }}
          path: out/firmware_${{ matrix.board }}.bin

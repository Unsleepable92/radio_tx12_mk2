name: EdgeTX TX12 MK2 (Real CI via build-cli)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # SYSTEM DEPENDENCIES
      # =========================
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            wget \
            unzip

      # =========================
      # CLONE EDGE TX
      # =========================
      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      # =========================
      # PYTHON BUILD ENV
      # =========================
      - name: Install Python deps
        run: |
          cd edgetx
          pip3 install --upgrade pip

          # если есть requirements — ставим
          if [ -f tools/requirements.txt ]; then
            pip3 install -r tools/requirements.txt
          fi

      # =========================
      # REAL BUILD ENTRYPOINT
      # =========================
      - name: Build firmware (REAL EdgeTX method)
        run: |
          cd edgetx

          if [ ! -f tools/build-cli.py ]; then
            echo "❌ build-cli.py not found → wrong EdgeTX version"
            exit 1
          fi

          python3 tools/build-cli.py \
            --board tx12 \
            --release \
            --lua

      # =========================
      # FIND RESULT (NO GUESSING)
      # =========================
      - name: Locate firmware
        run: |
          cd edgetx

          echo "=== Searching firmware ==="
          find . -type f -name "*.bin" -exec ls -lh {} \;

          FW=$(find . -type f -name "*.bin" | grep -i tx12 | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ Firmware not produced"
            exit 1
          fi

          echo "✅ Found: $FW"

          mkdir -p ../out
          cp "$FW" ../out/firmware_tx12.bin

      # =========================
      # VERIFY
      # =========================
      - name: Verify firmware
        run: |
          ls -lh out/firmware_tx12.bin
          file out/firmware_tx12.bin

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12
          path: out/firmware_tx12.bin

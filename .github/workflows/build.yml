name: EdgeTX Real Dev CI (Correct TX12 + Lua)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        board: [tx12]

    steps:
      # =========================
      # DEPENDENCIES (DEV MATCH)
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            rsync \
            wget \
            unzip

      # =========================
      # CLONE (FULL EDGE TX)
      # =========================
      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      # =========================
      # SUPERBUILD CONFIG (REAL CI STYLE)
      # =========================
      - name: Configure EdgeTX superbuild
        run: |
          cd edgetx

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DEDGETX_SUPERBUILD=ON \
            -DPCB=${{ matrix.board }} \
            -DLUA=ON \
            -DLUA_MODEL_SCRIPTS=ON \
            -DLUA_TELEMETRY_SCRIPTS=ON \
            -DHELI=OFF

      # =========================
      # BUILD
      # =========================
      - name: Build firmware
        run: |
          cd edgetx
          cmake --build build -j$(nproc)

      # =========================
      # VERIFY LUA SUPPORT
      # =========================
      - name: Verify Lua presence
        run: |
          cd edgetx

          echo "Checking Lua artifacts..."

          find build -type f | grep -i lua || true

          echo "Checking scripts folders..."
          find build -type d | grep -i script || true

      # =========================
      # EXTRACT FIRMWARE
      # =========================
      - name: Extract firmware
        run: |
          cd edgetx
          mkdir -p ../out

          FW=$(find build -type f -name "*.bin" | grep -i tx12 | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ No firmware produced"
            exit 1
          fi

          echo "Firmware: $FW"
          ls -lh "$FW"

          cp "$FW" ../out/firmware_tx12_lua.bin

      # =========================
      # VERIFY FINAL OUTPUT
      # =========================
      - name: Verify firmware
        run: |
          ls -lh out/
          file out/firmware_tx12_lua.bin

      # =========================
      # UPLOAD
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12-lua
          path: out/firmware_tx12_lua.bin

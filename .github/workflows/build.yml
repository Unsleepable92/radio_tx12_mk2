name: EdgeTX TX12 MK2 (FIXED CI FINAL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # DEPENDENCIES
      # =========================
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            make \
            python3 \
            python3-pip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            wget \
            unzip

          python3 -m pip install --upgrade pip
          python3 -m pip install pillow

      # =========================
      # CLONE EDGE TX
      # =========================
      - name: Clone EdgeTX
        run: |
          git clone --recursive --branch v2.9.0 https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      # =========================
      # CONFIGURE
      # =========================
      - name: Configure CMake
        run: |
          cd edgetx
          mkdir build
          cd build

          cmake .. \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES

      # =========================
      # BUILD FIRMWARE
      # =========================
      - name: Build firmware
        run: |
          cd edgetx/build
          cmake --build . --target firmware -j$(nproc)

      # =========================
      # FIND FIRMWARE
      # =========================
      - name: Find firmware
        run: |
          cd edgetx

          echo "Searching firmware..."

          find build -type f -name "*.bin" -exec ls -lh {} \;

          FW=$(find build -type f -name "*.bin" | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ Firmware not found"
            echo "Dumping build tree:"
            find build -type f | head -n 200
            exit 1
          fi

          echo "✅ Found firmware: $FW"

          mkdir -p ../out
          cp "$FW" ../out/firmware_tx12_mk2.bin

      # =========================
      # VERIFY
      # =========================
      - name: Verify firmware
        run: |
          ls -lh out/
          file out/firmware_tx12_mk2.bin

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12-mk2
          path: out/firmware_tx12_mk2.bin

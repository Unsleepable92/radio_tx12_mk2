name: Build EdgeTX TX12MK2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EdgeTX (stable release)
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: v2.12.0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3 \
            python3-pip \
            cmake \
            build-essential \
            git

          pip3 install lz4

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. \
            -DPCB=TX12 \
            -DLUA=YES \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build firmware
        run: |
          cd build
          make -j$(nproc) firmware

      - name: Find firmware
        run: |
          echo "Searching firmware..."
          find build -name "*.bin" -size +500k

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: build/**/*.bin

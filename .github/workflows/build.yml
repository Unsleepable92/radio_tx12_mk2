name: EdgeTX TX12 MK2 (SUPERBUILD FIX)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi

      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      - name: Configure SUPERBUILD (IMPORTANT)
        run: |
          cd edgetx
          cmake -S . -B build -G Ninja \
            -DHELI=NO \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES \
            -DCMAKE_BUILD_TYPE=Release \
            -DEDGETX_SUPERBUILD=ON

      - name: Build SUPERBUILD
        run: |
          cd edgetx
          cmake --build build -j$(nproc)

      - name: Find firmware (STRICT)
        run: |
          cd edgetx
          mkdir -p ../out

          echo "Searching real firmware..."

          find build -type f -name "*.bin" -exec ls -lh {} \;

          FW=$(find build -type f -name "*.bin" | grep -i tx12 | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ NO TX12 firmware generated"
            exit 1
          fi

          echo "Selected: $FW"
          ls -lh "$FW"

          cp "$FW" ../out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

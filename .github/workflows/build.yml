name: EdgeTX TX12 MK2 (preset build)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip

      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      - name: List available presets
        run: |
          cd edgetx
          cmake --list-presets

      - name: Configure (TX12 MK2 preset)
        run: |
          cd edgetx
          cmake --preset tx12

      - name: Build
        run: |
          cd edgetx
          cmake --build --preset tx12 -j$(nproc)

      - name: Find firmware
        run: |
          cd edgetx
          mkdir -p ../out

          echo "Searching firmware..."

          FW=$(find build -type f -iname "*.bin" | grep -E "tx12|edgetx|firmware" | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ No firmware found"
            find build -type f -name "*.bin" -exec ls -lh {} \;
            exit 1
          fi

          echo "✅ Firmware: $FW"
          ls -lh "$FW"

          cp "$FW" ../out/firmware_TX12MK2.bin

      - name: Verify
        run: |
          ls -lh out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

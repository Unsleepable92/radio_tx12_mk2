name: EdgeTX TX12 MK2 Official Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip

      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Setup build system
        run: |
          cd edgetx
          git submodule update --init --recursive

      - name: Configure (official target method)
        run: |
          cd edgetx
          cmake -B build -G Ninja \
            -DHELI=NO \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES \
            -DCMAKE_BUILD_TYPE=Release \
            -DTARGET=tx12

      - name: Build
        run: |
          cd edgetx
          cmake --build build -j$(nproc)

      - name: Find real firmware (strict filter)
        run: |
          cd edgetx
          mkdir -p ../out

          echo "Searching firmware..."

          FW=$(find build -type f -iname "*tx12*.bin" | head -n 1)

          if [ -z "$FW" ]; then
            echo "No tx12 firmware found, dumping build output:"
            find build -type f -name "*.bin" -exec ls -lh {} \;
            exit 1
          fi

          echo "Selected: $FW"
          ls -lh "$FW"

          cp "$FW" ../out/firmware_TX12MK2.bin

      - name: Verify size
        run: |
          ls -lh out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

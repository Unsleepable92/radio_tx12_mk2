name: EdgeTX TX12 MK2 (correct firmware preset)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            git \
            wget \
            unzip

      - name: Clone EdgeTX
        run: |
          git clone --recursive https://github.com/EdgeTX/edgetx.git

      - name: Init submodules
        run: |
          cd edgetx
          git submodule update --init --recursive

      - name: Configure firmware preset (REAL WAY)
        run: |
          cd edgetx
          cmake --preset firmware \
            -DPCB=TX12 \
            -DPCB_TYPE=TX12MK2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES

      - name: Build
        run: |
          cd edgetx
          cmake --build build -j$(nproc)

      - name: Find real firmware
        run: |
          cd edgetx
          mkdir -p ../out

          echo "Searching firmware..."

          FW=$(find build -type f -iname "*.bin" | grep -E "tx12|firmware|edgetx" | head -n 1)

          if [ -z "$FW" ]; then
            echo "❌ No firmware found"
            find build -type f -name "*.bin" -exec ls -lh {} \;
            exit 1
          fi

          echo "✅ Selected firmware: $FW"
          ls -lh "$FW"

          cp "$FW" ../out/firmware_TX12MK2.bin

      - name: Verify result
        run: |
          ls -lh out/firmware_TX12MK2.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-tx12mk2
          path: out/firmware_TX12MK2.bin

name: TX12 MK2 Lua Build FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EdgeTX
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          fetch-depth: 1
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build clang python3 git wget python3-pip

      - name: Install Python dependencies
        run: |
          pip3 install pillow pydantic lz4

      - name: Install ARM Toolchain 14.2
        run: |
          wget https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz
          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz
          echo "$PWD/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DDEFAULT_TARGET=tx12mk2 \
            -DLUA=YES \
            -DLUA_MODEL_SCRIPTS=YES \
            -DLUA_TELEMETRY_SCRIPTS=YES

      - name: Build firmware
        run: |
          cmake --build build --target firmware -j$(nproc)

      - name: Show firmware files
        run: |
          find build -name "*.bin"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: tx12mk2-lua
          path: build/**/*.bin
